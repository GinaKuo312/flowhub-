<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="author" content="FlowHub">
<meta name="copyright" content="(c) 2026 FlowHub. All rights reserved.">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowHub 月付金試算系統</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💫</text></svg>">
<style>
  :root{
    /* FlowHub Gold/Champagne Palette - from logo */
    --brand:#8b7355;--brand-light:#a08968;--brand-dark:#6b5740;
    --gold:#c9a96e;--gold-light:#dcc9a5;--gold-lighter:#efe3cc;--gold-pale:#f8f2e8;--gold-deep:#b8944a;
    --champagne:#d4b896;--champagne-light:#e8d5b8;
    --cream:#faf7f2;--cream-dark:#f2ece3;--cream-deep:#e8dfd3;
    --text:#4a4240;--text-light:#7a706a;--text-muted:#a89e94;
    --sage:#6a8a6a;--sage-bg:#eef5ee;--sage-lt:#d4e8d4;--sage-dark:#3e6e3e;
    --white:#ffffff;
    --red:#c0392b;--red-bg:#fce8e6;
    --g50:#faf8f6;--g100:#f5f0ea;--g200:#e8e0d6;--g300:#d6ccc0;--g400:#a89e94;--g500:#7a706a;--g600:#5c544e;--g700:#3e3836;--g800:#2a2624;
    --radius:12px;--radius-lg:16px;
    --shadow:0 2px 8px rgba(107,87,64,.06);--shadow-md:0 8px 24px rgba(107,87,64,.1);--shadow-lg:0 12px 40px rgba(107,87,64,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Microsoft JhengHei',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--cream);color:var(--text);min-height:100vh}

  /* NAV */
  .nav{background:linear-gradient(135deg,#3e3430 0%,#5c4a3e 40%,#6b5740 100%);padding:0 28px;display:flex;align-items:center;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(62,52,48,.25)}
  .nav-brand{font-size:17px;font-weight:700;color:#fff;margin-right:32px;white-space:nowrap;display:flex;align-items:center;gap:6px;letter-spacing:.5px}
  .nav-brand .brand-name{font-style:italic;letter-spacing:.8px;font-size:19px}
  .nav-brand .brand-sep{opacity:.3;font-weight:300;margin:0 2px}
  .nav-brand .brand-desc{font-size:13px;opacity:.55;font-weight:400;letter-spacing:.3px}
  .nav-tabs{display:flex;gap:4px}
  .nav-tab{padding:8px 18px;border:none;background:none;cursor:pointer;font-size:14px;color:rgba(255,255,255,.45);border-radius:8px;font-weight:500;transition:.2s;letter-spacing:.3px}
  .nav-tab:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.08)}
  .nav-tab.active{color:#fff;background:rgba(255,255,255,.12);backdrop-filter:blur(4px)}

  .container{max-width:960px;margin:0 auto;padding:24px 20px}
  .card{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);border:1px solid rgba(201,169,110,.12);overflow:hidden}
  .card-body{padding:24px}

  /* ===== FRONT - Premium Design ===== */
  .front-card{border:none;box-shadow:var(--shadow-lg);border-radius:20px;overflow:hidden}

  .store-banner{
    background:linear-gradient(135deg,#4a3f35 0%,#5c4a3e 30%,#6b5740 60%,#7a6550 100%);
    padding:28px 32px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;
    position:relative;overflow:hidden
  }
  .store-banner::before{
    content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;
    background:radial-gradient(circle,rgba(201,169,110,.15) 0%,transparent 70%);border-radius:50%
  }
  .store-banner::after{
    content:'';position:absolute;bottom:-30%;left:10%;width:200px;height:200px;
    background:radial-gradient(circle,rgba(212,184,150,.1) 0%,transparent 70%);border-radius:50%
  }
  .store-name{font-size:26px;font-weight:800;letter-spacing:1px;position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.15)}
  .store-sub{font-size:12px;opacity:.5;margin-top:4px;position:relative;z-index:1;font-weight:300;letter-spacing:.5px}
  .store-sel{padding:8px 14px;border-radius:8px;border:1px solid rgba(201,169,110,.3);background:rgba(255,255,255,.08);color:#fff;font-size:13px;outline:none;cursor:pointer;backdrop-filter:blur(4px);position:relative;z-index:1;transition:.2s}
  .store-sel:hover{background:rgba(255,255,255,.12);border-color:rgba(201,169,110,.5)}
  .store-sel option{color:#333;background:#fff}

  /* Amount Input - Premium */
  .calc-input-area{
    padding:30px 32px;display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap;
    background:linear-gradient(180deg,var(--gold-pale) 0%,var(--white) 100%);
    border-bottom:1px solid var(--g200)
  }
  .calc-f{display:flex;flex-direction:column;gap:8px;flex:1;min-width:200px}
  .calc-f label{font-size:12px;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:1.5px}
  .input-wrap{position:relative;display:flex;align-items:center}
  .input-wrap .currency{position:absolute;left:16px;font-size:20px;font-weight:700;color:var(--gold);z-index:1}
  .calc-f input[type="text"]{
    width:100%;padding:16px 18px 16px 42px;
    border:2px solid var(--g300);border-radius:12px;
    font-size:24px;font-weight:800;outline:none;
    background:var(--white);color:var(--brand-dark);
    transition:.25s;letter-spacing:1px;
    box-shadow:inset 0 2px 4px rgba(107,87,64,.04)
  }
  .calc-f input[type="text"]:focus{
    border-color:var(--gold);
    box-shadow:0 0 0 4px rgba(201,169,110,.15),inset 0 2px 4px rgba(107,87,64,.04)
  }
  .calc-f input[type="text"]::placeholder{color:var(--g400);font-weight:400;font-size:16px;letter-spacing:0}
  .fc-select{
    width:100%;padding:14px 14px;border:2px solid var(--g300);border-radius:12px;
    font-size:15px;font-weight:600;outline:none;background:var(--white);color:var(--brand-dark);
    cursor:pointer;transition:.25s;appearance:auto
  }
  .fc-select:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,169,110,.15)}
  .amt-preview{font-size:14px;color:var(--text-light);align-self:center;white-space:nowrap;padding-bottom:8px}
  .amt-preview b{color:var(--brand-dark);font-size:16px}

  /* Plan Toggle - Elegant */
  .toggle-section{padding:20px 32px}
  .type-toggle{display:flex;border-radius:14px;overflow:hidden;border:2px solid var(--g200);background:var(--cream);position:relative}
  .type-btn{
    flex:1;padding:16px 12px;border:none;background:transparent;cursor:pointer;
    font-size:15px;font-weight:700;transition:.3s;text-align:center;color:var(--g400);
    position:relative;z-index:1
  }
  .type-btn:first-child{border-right:1px solid var(--g200)}
  .type-btn.sel-zero{background:linear-gradient(135deg,var(--sage-bg),#e0f0e0);color:var(--sage-dark);border-color:var(--sage);box-shadow:inset 0 2px 8px rgba(106,138,106,.1)}
  .type-btn.sel-gen{background:linear-gradient(135deg,var(--gold-pale),var(--gold-lighter));color:var(--brand-dark);border-color:var(--gold);box-shadow:inset 0 2px 8px rgba(201,169,110,.1)}
  .type-btn:hover:not(.sel-zero):not(.sel-gen){background:rgba(201,169,110,.06)}
  .type-sub{font-size:11px;font-weight:400;display:block;margin-top:4px;opacity:.55}

  /* Results - Premium Cards */
  .res-area{padding:20px 32px 32px}
  .res-section{border-radius:16px;overflow:hidden;border:1px solid var(--g200);margin-bottom:18px;box-shadow:var(--shadow);transition:.25s;background:var(--white)}
  .res-section:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .res-hdr{padding:16px 22px;font-size:16px;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:.3px}
  .res-hdr.zh{background:linear-gradient(135deg,var(--sage-bg),#e0f0e0);color:var(--sage-dark);border-bottom:2px solid var(--sage-lt)}
  .res-hdr.gh{background:linear-gradient(135deg,var(--gold-pale),var(--gold-lighter));color:var(--brand-dark);border-bottom:2px solid var(--gold-lighter)}
  .res-hdr .pill{font-size:11px;padding:4px 11px;border-radius:12px;margin-left:auto;font-weight:700;letter-spacing:.5px}
  .res-hdr.zh .pill{background:var(--sage-lt);color:var(--sage-dark)}
  .res-hdr.gh .pill{background:var(--gold-lighter);color:var(--brand)}

  .rt{width:100%;border-collapse:collapse}
  .rt th{padding:12px 18px;font-size:12px;font-weight:700;text-align:center;border-bottom:2px solid var(--g200);letter-spacing:.5px}
  .rt.zt th{background:#f5faf5;color:var(--sage)}
  .rt.gt th{background:var(--gold-pale);color:var(--gold-deep)}
  .rt td{padding:14px 18px;text-align:center;font-size:14px;border-bottom:1px solid var(--g100)}
  .rt tr:nth-child(even) td{background:var(--g50)}
  .rt tr:hover td{background:var(--cream-dark)}
  .rt .period{font-weight:700;color:var(--g600);font-size:15px}
  .rt .monthly{font-size:22px;font-weight:800;color:var(--brand-dark);letter-spacing:.3px;white-space:nowrap}
  .rt.gt .monthly{background:linear-gradient(135deg,var(--gold-deep),var(--brand-dark));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .rt.zt .monthly{color:var(--sage-dark)}
  .rt .note{font-size:11px;color:var(--g400);font-style:italic;padding:10px 18px;background:var(--g50)}

  .no-msg{padding:40px;text-align:center;color:var(--g400);font-size:15px}
  .no-msg .no-icon{font-size:36px;margin-bottom:10px;opacity:.5}

  /* Powered by footer */
  .powered-by{text-align:center;padding:14px;font-size:11px;color:var(--text-muted);letter-spacing:.5px;border-top:1px solid var(--g100)}
  .powered-by strong{color:var(--gold);font-weight:700}

  /* ===== PASSWORD GATE ===== */
  .pw-gate{max-width:400px;margin:80px auto;text-align:center}
  .pw-gate .pw-icon{font-size:52px;margin-bottom:18px}
  .pw-gate h2{font-size:22px;font-weight:700;color:var(--brand);margin-bottom:8px}
  .pw-gate p{font-size:13px;color:var(--text-light);margin-bottom:24px}
  .pw-input-wrap{display:flex;gap:10px}
  .pw-input-wrap input{flex:1;padding:12px 16px;border:2px solid var(--g300);border-radius:10px;font-size:15px;outline:none;text-align:center;letter-spacing:3px;transition:.2s}
  .pw-input-wrap input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(201,169,110,.12)}
  .pw-input-wrap button{padding:12px 24px;background:linear-gradient(135deg,var(--brand-dark),var(--brand-light));color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;letter-spacing:.5px}
  .pw-input-wrap button:hover{opacity:.9;transform:translateY(-1px)}
  .pw-error{color:var(--red);font-size:13px;margin-top:12px;display:none}

  /* ===== ADMIN ===== */
  .admin-tabs{display:flex;gap:4px;margin-bottom:18px;background:var(--cream-dark);padding:4px;border-radius:10px}
  .admin-tab{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;color:var(--g500);transition:.2s;text-align:center}
  .admin-tab.active{background:var(--white);color:var(--text);box-shadow:var(--shadow);font-weight:700}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  .stat{background:var(--white);border:1px solid var(--g200);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:.2s}
  .stat:hover{box-shadow:var(--shadow-md)}
  .stat-l{font-size:12px;color:var(--text-light);margin-bottom:4px}.stat-v{font-size:24px;font-weight:800;color:var(--brand)}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
  .toolbar-t{font-size:17px;font-weight:700;color:var(--brand)}
  .toolbar-a{display:flex;gap:8px;flex-wrap:wrap}

  .search-bar{margin-bottom:14px}
  .search-bar input{width:100%;padding:10px 16px;border:2px solid var(--g200);border-radius:10px;font-size:14px;outline:none;background:var(--white);transition:.2s}
  .search-bar input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.1)}

  .at{width:100%;border-collapse:collapse;font-size:13px}
  .at th{text-align:left;padding:11px 14px;background:var(--cream);border-bottom:2px solid var(--g200);font-weight:700;color:var(--g600);white-space:nowrap}
  .at td{padding:11px 14px;border-bottom:1px solid var(--g100);vertical-align:top}
  .at tr:hover td{background:var(--cream)}

  .tags{display:flex;flex-wrap:wrap;gap:4px}
  .tag{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
  .tag-z{background:var(--sage-bg);color:var(--sage-dark)}
  .tag-g{background:var(--gold-pale);color:var(--gold-deep)}
  .tag-fc{background:var(--cream-dark);color:var(--brand)}

  .badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
  .b-on{background:#e8f5e9;color:#2e7d32}.b-off{background:var(--red-bg);color:var(--red)}

  .btn{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:5px}
  .btn-p{background:linear-gradient(135deg,var(--brand-dark),var(--brand-light));color:#fff}.btn-p:hover{opacity:.9;transform:translateY(-1px)}
  .btn-o{background:var(--white);color:var(--g600);border:1px solid var(--g300)}.btn-o:hover{background:var(--cream);border-color:var(--gold-light)}
  .btn-d{background:var(--red);color:#fff}.btn-d:hover{opacity:.9}
  .btn-s{background:var(--sage);color:#fff}
  .btn-lock{padding:8px 16px;background:rgba(201,169,110,.15);color:var(--gold);border:1px solid rgba(201,169,110,.25);border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:.2s}
  .btn-lock:hover{background:rgba(201,169,110,.25);color:var(--gold-deep)}

  /* MODALS */
  .overlay{position:fixed;inset:0;background:rgba(74,66,64,.5);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
  .modal{background:var(--white);border-radius:18px;width:92%;max-width:720px;max-height:88vh;overflow-y:auto;padding:28px;box-shadow:var(--shadow-lg)}
  .m-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .m-head h3{font-size:18px;font-weight:700;color:var(--brand)}
  .m-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--g400);padding:4px;transition:.2s}.m-close:hover{color:var(--text)}

  .fg{margin-bottom:14px}
  .fg label{display:block;font-size:12px;font-weight:700;color:var(--g600);margin-bottom:5px}
  .fg input,.fg select{width:100%;padding:9px 12px;border:1.5px solid var(--g300);border-radius:8px;font-size:14px;outline:none;background:var(--white);transition:.2s}
  .fg input:focus,.fg select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.1)}
  .fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  .plan-list{border:1px solid var(--g200);border-radius:10px;overflow:hidden;margin-top:8px}
  .pl-hdr{display:grid;grid-template-columns:55px 90px 1fr 1fr 32px;background:var(--cream-dark);font-size:11px;font-weight:700;color:var(--g500)}
  .pl-hdr>div{padding:8px 6px;text-align:center}
  .pl-row{display:grid;grid-template-columns:55px 90px 1fr 1fr 32px;border-top:1px solid var(--g100);align-items:center}
  .pl-row>div{padding:6px 4px;display:flex;align-items:center;justify-content:center}
  .pl-row .pr-p{font-weight:700;font-size:13px;color:var(--g600);background:var(--cream)}
  .pl-row select{width:100%;padding:5px;border:1px solid var(--g200);border-radius:6px;font-size:12px;text-align:center}
  .pl-row input{width:100%;padding:5px;border:1px solid var(--g200);border-radius:6px;font-size:12px;text-align:center;outline:none}
  .pl-row input:focus{border-color:var(--gold)}
  .pl-row input.i-g{color:var(--gold-deep);font-weight:700}
  .pl-row input.i-z{color:var(--sage-dark);font-weight:700}
  .pl-row .x-btn{background:none;border:none;color:var(--g400);cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px}
  .pl-row .x-btn:hover{background:var(--red-bg);color:var(--red)}

  .add-bar{display:flex;gap:6px;align-items:center;padding:8px 10px;border-top:1px solid var(--g100);background:var(--cream);flex-wrap:wrap}
  .add-bar select{padding:5px 8px;border:1px solid var(--g200);border-radius:6px;font-size:12px}
  .add-bar button{padding:5px 12px;background:var(--brand);color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600}

  .m-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

  .fc-checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:8px}
  .fc-chk{display:flex;align-items:center;gap:7px;padding:10px 12px;border:1.5px solid var(--g200);border-radius:10px;font-size:13px;cursor:pointer;transition:.2s}
  .fc-chk:hover{background:var(--cream);border-color:var(--gold-light)}
  .fc-chk.checked{background:var(--gold-pale);border-color:var(--gold)}
  .fc-chk input{accent-color:var(--gold)}

  /* Store FC Config Cards */
  .st-fc-card{border:1.5px solid var(--gold-light);border-radius:12px;overflow:hidden;background:var(--white)}
  .st-fc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--gold-pale);border-bottom:1px solid var(--gold-light)}
  .st-fc-hdr strong{font-size:14px;color:var(--brand-dark)}
  .st-fc-hdr .st-fc-acts{display:flex;gap:6px;align-items:center}
  .st-fc-plan-list{font-size:12px}
  .st-fc-plan-hdr{display:grid;grid-template-columns:60px 1fr 1fr 28px;background:var(--cream-dark);font-weight:700;color:var(--g500)}
  .st-fc-plan-hdr>div{padding:8px 6px;text-align:center;font-size:11px}
  .st-fc-plan-row{display:grid;grid-template-columns:60px 1fr 1fr 28px;border-top:1px solid var(--g100);align-items:center}
  .st-fc-plan-row>div{padding:6px 5px;display:flex;align-items:center;justify-content:center}
  .st-fc-plan-row .pp{font-weight:700;font-size:13px;color:var(--g600);background:var(--cream)}
  .st-fc-plan-row select{width:100%;padding:6px;border:1px solid var(--g200);border-radius:6px;font-size:12px;text-align:center}
  .st-fc-plan-row input{width:100%;padding:8px 6px;border:1.5px solid var(--g200);border-radius:8px;font-size:14px;text-align:center;outline:none;transition:.2s}
  .st-fc-plan-row input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,110,.12)}
  .st-fc-plan-row .xb{background:none;border:none;color:var(--g400);cursor:pointer;font-size:14px;padding:2px}
  .st-fc-plan-row .xb:hover{color:var(--red)}
  .st-fc-add{display:flex;gap:6px;align-items:center;padding:8px 10px;border-top:1px solid var(--g100);background:var(--cream);flex-wrap:wrap}
  .st-fc-add span{font-size:11px;color:var(--g500);font-weight:600}
  .st-fc-add select{padding:4px 6px;border:1px solid var(--g200);border-radius:5px;font-size:11px}
  .st-fc-add button{padding:4px 10px;background:var(--brand);color:#fff;border:none;border-radius:5px;font-size:11px;cursor:pointer;font-weight:600}

  /* Store Link */
  .store-link{display:flex;align-items:center;gap:6px;margin-top:6px}
  .store-link input{flex:1;padding:5px 8px;border:1px solid var(--g200);border-radius:6px;font-size:11px;color:var(--text-light);background:var(--cream);cursor:text}
  .store-link button{padding:4px 10px;background:var(--gold-pale);color:var(--gold-deep);border:1px solid var(--gold-light);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.2s}
  .store-link button:hover{background:var(--gold-lighter)}
  .store-link button.btn-short{background:var(--sage-bg);color:var(--sage-dark);border-color:var(--sage-lt)}
  .store-link button.btn-short:hover{background:var(--sage-lt)}
  .store-link button:disabled{opacity:.6;cursor:wait}
  .copied{background:var(--sage-bg)!important;color:var(--sage-dark)!important;border-color:var(--sage-lt)!important}

  /* Disbursement reveal toggle */
  .disb-cell{position:relative;cursor:pointer;user-select:none}
  .disb-hidden{color:transparent;background:var(--cream-dark);border-radius:6px;padding:2px 12px;font-size:12px;letter-spacing:2px;display:inline-block;min-width:80px;text-align:center;position:relative}
  .disb-hidden::after{content:'點擊查看';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:11px;font-weight:600;letter-spacing:0}
  .disb-show{font-size:14px;color:var(--text);font-weight:500}
  .disb-toggle-bar{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:6px 18px;background:var(--g50);border-top:1px solid var(--g100)}
  .disb-toggle-btn{padding:4px 12px;border:1px solid var(--sage-lt);background:var(--sage-bg);color:var(--sage-dark);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:.2s}
  .disb-toggle-btn:hover{background:var(--sage-lt)}
  .disb-toggle-btn.revealed{background:var(--cream-dark);border-color:var(--g300);color:var(--text-light)}

  /* Copyright watermark */
  .copyright-bar{text-align:center;padding:10px;font-size:10px;color:var(--text-muted);letter-spacing:.3px;background:var(--cream-dark);border-top:1px solid var(--g200)}

  .hidden{display:none!important}
  .toast{position:fixed;bottom:24px;right:24px;background:linear-gradient(135deg,var(--brand-dark),var(--brand));color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);z-index:300;animation:su .35s ease}
  @keyframes su{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

  @media(max-width:768px){
    .stats-row{grid-template-columns:1fr 1fr}
    .calc-input-area{flex-direction:column;padding:20px 16px;gap:14px}
    .calc-f{max-width:100%!important;min-width:0!important}
    .container{padding:14px 10px}
    .front-card{border-radius:18px}
    .pl-hdr,.pl-row{grid-template-columns:50px 75px 1fr 1fr 28px}

    /* Store banner - compact but elegant on mobile */
    .store-banner{padding:20px 20px 18px}
    .store-name{font-size:21px;letter-spacing:.5px}
    .store-sub{font-size:11px}
    .store-sel{padding:9px 14px;font-size:13px;min-height:40px}

    /* Amount input - tall, readable */
    .calc-f label{font-size:11px;letter-spacing:1.2px}
    .calc-f input[type="text"]{font-size:26px;padding:16px 16px 16px 40px;border-radius:14px;font-weight:800}
    .input-wrap .currency{font-size:22px;left:14px;color:var(--gold-deep)}
    .fc-select{padding:14px;font-size:15px;min-height:50px;border-radius:14px}
    .amt-preview{font-size:13px;padding:6px 2px 0;width:100%}
    .amt-preview b{font-size:15px}

    /* Type toggle - bigger touch targets, clearer selection */
    .toggle-section{padding:14px 16px}
    .type-toggle{flex-direction:row;border-radius:14px}
    .type-btn{padding:14px 8px;font-size:14px;min-height:58px;line-height:1.3}
    .type-btn:first-child{border-right:1px solid var(--g200);border-bottom:none}
    .type-sub{font-size:10px;margin-top:3px}

    /* Results - spotlight mobile design */
    .res-area{padding:12px 12px 20px}
    .res-section{margin-bottom:14px;border-radius:14px}
    .res-hdr{padding:13px 16px;font-size:15px}
    .res-hdr .pill{font-size:10px;padding:3px 9px}

    /* Result table -> stacked mobile cards */
    .rt thead{display:none}
    .rt,.rt tbody,.rt tr,.rt td{display:block;width:100%}
    .rt tr{
      padding:14px 16px;border-bottom:1px solid var(--g100);
      display:grid;grid-template-columns:auto 1fr;gap:4px 14px;align-items:center;
      background:var(--white)
    }
    .rt tr:nth-child(even){background:var(--g50)}
    .rt tr:nth-child(even) td{background:transparent}
    .rt tr:hover td{background:transparent}
    .rt td{padding:0;border:none;text-align:left;font-size:13px;color:var(--text-light)}
    .rt .period{
      grid-row:span 2;font-size:13px;font-weight:800;color:var(--white);
      background:linear-gradient(135deg,var(--gold-deep),var(--brand));
      padding:10px 8px;border-radius:12px;text-align:center;
      min-width:58px;letter-spacing:.5px;
      box-shadow:0 2px 6px rgba(201,169,110,.25)
    }
    .rt.zt .period{background:linear-gradient(135deg,var(--sage),var(--sage-dark))}
    .rt .monthly{
      font-size:28px;font-weight:800;color:var(--brand-dark);
      letter-spacing:.3px;line-height:1.1
    }
    .rt td:not(.period):not(.monthly){
      font-size:12px;color:var(--text-light);
      grid-column:2;padding-top:2px
    }
    .rt td.disb-col{display:block;grid-column:2}
    .rt td.disb-col[style*="none"]{display:none!important}
    .rt td.disb-col::before{content:'撥款 ';font-size:10px;color:var(--g400);font-weight:600}

    .disb-toggle-bar{padding:8px 16px;justify-content:center}
    .disb-toggle-btn{padding:8px 18px;font-size:12px;min-height:36px}
    .no-msg{padding:30px 16px;font-size:14px}

    /* Nav - tighter */
    .nav{padding:0 14px;height:54px}
    .nav-brand{font-size:14px;margin-right:8px;gap:4px}
    .nav-brand .brand-name{font-size:16px}
    .nav-brand .brand-sep{display:none}
    .nav-brand .brand-desc{display:none}
    .nav-tab{padding:7px 12px;font-size:13px}
    .powered-by{padding:12px;font-size:10px}
  }

  @media(max-width:420px){
    .store-name{font-size:19px}
    .store-banner{padding:18px 16px 16px;flex-direction:column;align-items:flex-start}
    .store-sel{width:100%}
    .calc-f input[type="text"]{font-size:24px}
    .rt .monthly{font-size:26px}
    .type-btn{font-size:13px;padding:12px 6px}
  }
</style>

</div></div>
